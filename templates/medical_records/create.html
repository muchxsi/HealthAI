{% extends "base.html" %}

{% block content %}

<div class="card shadow border-0">

<div class="card-header bg-primary text-white">

    <h3>
        New Medical Record
    </h3>

</div>

<div class="card-body">

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Patient
            </label>

            <select
                name="patient_id"
                class="form-select"
                required>

                {% for patient in patients %}

                <option value="{{ patient.id }}">

                    {{ patient.first_name }}
                    {{ patient.last_name }}

                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Appointment
            </label>

            <select
                name="appointment_id"
                class="form-select">

                <option value="">
                    No Appointment
                </option>

                {% for appointment in appointments %}

                <option value="{{ appointment.id }}">

                    Appointment #{{ appointment.id }}

                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Symptoms
            </label>

            <textarea
                name="symptoms"
                class="form-control"></textarea>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Diagnosis
            </label>

            <textarea
                name="diagnosis"
                class="form-control"></textarea>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Treatment
            </label>

            <textarea
                name="treatment"
                class="form-control"></textarea>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Prescription
            </label>

            <textarea
                name="prescription"
                class="form-control"></textarea>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Notes
            </label>

            <textarea
                name="notes"
                class="form-control"></textarea>

        </div>

        <button
            type="submit"
            class="btn btn-primary">

            Save Record

        </button>

    </form>

</div>

</div>

{% endblock %}
