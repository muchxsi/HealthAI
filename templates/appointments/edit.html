{% extends "base.html" %}

{% block content %}

<h2 class="fw-bold mb-4">
    Edit Appointment
</h2>

<div class="card shadow border-0">

<div class="card-body">

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Patient
            </label>

            <select
                name="patient_id"
                class="form-control"
                required>

                {% for patient in patients %}

                <option
                    value="{{ patient.id }}"
                    {% if patient.id == appointment.patient_id %}
                    selected
                    {% endif %}>

                    {{ patient.first_name }}
                    {{ patient.last_name }}

                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Doctor
            </label>

            <select
                name="doctor_id"
                class="form-control"
                required>

                {% for doctor in doctors %}

                <option
                    value="{{ doctor.id }}"
                    {% if doctor.id == appointment.doctor_id %}
                    selected
                    {% endif %}>

                    Dr.
                    {{ doctor.first_name }}
                    {{ doctor.last_name }}

                </option>

                {% endfor %}

            </select>

        </div>

        <div class="row">

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Appointment Date
                </label>

                <input
                    type="date"
                    name="appointment_date"
                    class="form-control"
                    value="{{ appointment.appointment_date }}"
                    required>

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Appointment Time
                </label>

                <input
                    type="time"
                    name="appointment_time"
                    class="form-control"
                    value="{{ appointment.appointment_time }}"
                    required>

            </div>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Status
            </label>

            <select
                name="status"
                class="form-control">

                <option value="Scheduled">
                    Scheduled
                </option>

                <option value="Completed">
                    Completed
                </option>

                <option value="Cancelled">
                    Cancelled
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Notes
            </label>

            <textarea
                name="notes"
                rows="4"
                class="form-control">{{ appointment.notes }}</textarea>

        </div>

        <button
            type="submit"
            class="btn btn-success">

            Update Appointment

        </button>

        <a href="/appointments/"
           class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>

</div>

{% endblock %}
