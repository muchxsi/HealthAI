{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-lg-8">

    <div class="card shadow border-0">

        <div class="card-header bg-primary text-white">

            <h3 class="mb-0">
                Schedule Appointment
            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Patient
                    </label>

                    <select
                        name="patient_id"
                        class="form-select"
                        required>

                        <option value="">
                            Select Patient
                        </option>

                        {% for patient in patients %}

                        <option value="{{ patient.id }}">

                            {{ patient.first_name }}
                            {{ patient.last_name }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Doctor
                    </label>

                    <select
                        name="doctor_id"
                        class="form-select"
                        required>

                        <option value="">
                            Select Doctor
                        </option>

                        {% for doctor in doctors %}

                        <option value="{{ doctor.id }}">

                            Dr.
                            {{ doctor.first_name }}
                            {{ doctor.last_name }}
                            ({{ doctor.specialization }})

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Appointment Date
                        </label>

                        <input
                            type="date"
                            name="appointment_date"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Appointment Time
                        </label>

                        <input
                            type="time"
                            name="appointment_time"
                            class="form-control"
                            required>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Notes
                    </label>

                    <textarea
                        name="notes"
                        class="form-control"
                        rows="4"
                        placeholder="Appointment notes..."></textarea>

                </div>

                <div class="d-flex justify-content-between">

                    <a
                        href="/appointments/"
                        class="btn btn-secondary">

                        Back

                    </a>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Schedule Appointment

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</div>

{% endblock %}
