{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-lg-8">

    <div class="card shadow border-0">

        <div class="card-header bg-primary text-white">

            <h3 class="mb-0">
                Create Bill
            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Patient
                    </label>

                    <select
                        name="patient_id"
                        class="form-select"
                        required>

                        <option value="">
                            Select Patient
                        </option>

                        {% for patient in patients %}

                        <option value="{{ patient.id }}">

                            {{ patient.first_name }}
                            {{ patient.last_name }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Service
                    </label>

                    <input
                        type="text"
                        name="service"
                        class="form-control"
                        placeholder="e.g. Consultation, Laboratory Test, X-Ray"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Amount (KES)
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        min="0"
                        name="amount"
                        class="form-control"
                        placeholder="Enter amount"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Payment Status
                    </label>

                    <select
                        name="payment_status"
                        class="form-select">

                        <option value="Pending">
                            Pending
                        </option>

                        <option value="Paid">
                            Paid
                        </option>

                    </select>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    <i class="bi bi-save"></i>

                    Save Bill

                </button>

                <a href="/billing/"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

</div>

{% endblock %}
