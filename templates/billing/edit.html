{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow border-0">

    <div class="card-header bg-warning text-dark">

        <h3>
            Edit Bill
        </h3>

    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Patient
                </label>

                <select
                    name="patient_id"
                    class="form-select"
                    required>

                    {% for patient in patients %}

                    <option
                        value="{{ patient.id }}"
                        {% if patient.id == bill.patient_id %}
                        selected
                        {% endif %}>

                        {{ patient.first_name }}
                        {{ patient.last_name }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Service
                </label>

                <input
                    type="text"
                    name="service"
                    class="form-control"
                    value="{{ bill.service }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Amount (KES)
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="amount"
                    class="form-control"
                    value="{{ bill.amount }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Payment Status
                </label>

                <select
                    name="payment_status"
                    class="form-select">

                    <option
                        value="Pending"
                        {% if bill.payment_status == "Pending" %}
                        selected
                        {% endif %}>

                        Pending

                    </option>

                    <option
                        value="Paid"
                        {% if bill.payment_status == "Paid" %}
                        selected
                        {% endif %}>

                        Paid

                    </option>

                </select>

            </div>

            <button
                type="submit"
                class="btn btn-warning">

                Update Bill

            </button>

            <a href="/billing/"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

</div>

</div>

{% endblock %}
