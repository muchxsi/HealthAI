{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-lg-8">

    <div class="card shadow border-0">

        <div class="card-header bg-warning text-dark">

            <h3>
                Edit Patient
            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            First Name
                        </label>

                        <input
                            type="text"
                            name="first_name"
                            class="form-control"
                            value="{{ patient.first_name }}"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Last Name
                        </label>

                        <input
                            type="text"
                            name="last_name"
                            class="form-control"
                            value="{{ patient.last_name }}"
                            required>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Gender
                    </label>

                    <select
                        name="gender"
                        class="form-select">

                        <option value="Male"
                        {% if patient.gender == "Male" %}selected{% endif %}>
                            Male
                        </option>

                        <option value="Female"
                        {% if patient.gender == "Female" %}selected{% endif %}>
                            Female
                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Phone
                    </label>

                    <input
                        type="text"
                        name="phone"
                        class="form-control"
                        value="{{ patient.phone }}">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        value="{{ patient.email }}">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Date of Birth
                    </label>

                    <input
                        type="date"
                        name="dob"
                        class="form-control"
                        value="{{ patient.dob }}">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Address
                    </label>

                    <textarea
                        name="address"
                        class="form-control"
                        rows="3">{{ patient.address }}</textarea>

                </div>

                <button
                    type="submit"
                    class="btn btn-warning">

                    Update Patient

                </button>

                <a href="/patients/"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

</div>

{% endblock %}
