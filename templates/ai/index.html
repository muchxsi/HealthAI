{% extends "base.html" %}

{% block content %}

<div class="card shadow border-0">

<div class="card-header bg-primary text-white">

    <h3>
        HealthAI Assistant
    </h3>

</div>

<div class="card-body">

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Ask the AI Assistant
            </label>

            <textarea
                name="prompt"
                rows="5"
                class="form-control"
                placeholder="Describe symptoms or ask a medical question..."></textarea>

        </div>

        <button
            type="submit"
            class="btn btn-primary">

            Ask AI

        </button>

    </form>

    {% if response %}

    <hr>

    <h5>Response</h5>

    <div class="alert alert-info">

        {{ response }}

    </div>

    {% endif %}

</div>

</div>

{% endblock %}
