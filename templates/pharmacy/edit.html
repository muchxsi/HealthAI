{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow border-0">

    <div class="card-header bg-warning text-dark">

        <h3>
            Edit Medication
        </h3>

    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Patient
                </label>

                <select
                    name="patient_id"
                    class="form-select"
                    required>

                    {% for patient in patients %}

                    <option
                        value="{{ patient.id }}"
                        {% if patient.id == medication.patient_id %}
                        selected
                        {% endif %}>

                        {{ patient.first_name }}
                        {{ patient.last_name }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Medication Name
                </label>

                <input
                    type="text"
                    name="medication_name"
                    class="form-control"
                    value="{{ medication.medication_name }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Dosage
                </label>

                <input
                    type="text"
                    name="dosage"
                    class="form-control"
                    value="{{ medication.dosage }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Quantity
                </label>

                <input
                    type="number"
                    name="quantity"
                    class="form-control"
                    value="{{ medication.quantity }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Status
                </label>

                <select
                    name="status"
                    class="form-select">

                    <option value="Pending"
                        {% if medication.status == "Pending" %}
                        selected
                        {% endif %}>
                        Pending
                    </option>

                    <option value="Dispensed"
                        {% if medication.status == "Dispensed" %}
                        selected
                        {% endif %}>
                        Dispensed
                    </option>

                </select>

            </div>

            <button
                type="submit"
                class="btn btn-warning">

                Update Medication

            </button>

            <a href="/pharmacy/"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

</div>

</div>

{% endblock %}
