{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-lg-8">

    <div class="card shadow border-0">

        <div class="card-header bg-primary text-white">

            <h3>
                Add Medication
            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Patient
                    </label>

                    <select
                        name="patient_id"
                        class="form-select"
                        required>

                        {% for patient in patients %}

                        <option value="{{ patient.id }}">

                            {{ patient.first_name }}
                            {{ patient.last_name }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Medication Name
                    </label>

                    <input
                        type="text"
                        name="medication_name"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Dosage
                    </label>

                    <input
                        type="text"
                        name="dosage"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Quantity
                    </label>

                    <input
                        type="number"
                        name="quantity"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Status
                    </label>

                    <select
                        name="status"
                        class="form-select">

                        <option value="Pending">
                            Pending
                        </option>

                        <option value="Dispensed">
                            Dispensed
                        </option>

                    </select>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Save Medication

                </button>

            </form>

        </div>

    </div>

</div>

</div>

{% endblock %}
