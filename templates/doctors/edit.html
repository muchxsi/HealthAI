{% extends "base.html" %}

{% block content %}

<h2 class="fw-bold mb-4">
    Edit Doctor
</h2>

<div class="card shadow border-0">

<div class="card-body">

    <form method="POST">

        <div class="row">

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    First Name
                </label>

                <input
                    type="text"
                    name="first_name"
                    class="form-control"
                    value="{{ doctor.first_name }}"
                    required>

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Last Name
                </label>

                <input
                    type="text"
                    name="last_name"
                    class="form-control"
                    value="{{ doctor.last_name }}"
                    required>

            </div>

        </div>

        <div class="row">

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Specialization
                </label>

                <input
                    type="text"
                    name="specialization"
                    class="form-control"
                    value="{{ doctor.specialization }}">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Department
                </label>

                <input
                    type="text"
                    name="department"
                    class="form-control"
                    value="{{ doctor.department }}">

            </div>

        </div>

        <div class="row">

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Phone
                </label>

                <input
                    type="text"
                    name="phone"
                    class="form-control"
                    value="{{ doctor.phone }}">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    value="{{ doctor.email }}">

            </div>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Consultation Fee
            </label>

            <input
                type="number"
                step="0.01"
                name="consultation_fee"
                class="form-control"
                value="{{ doctor.consultation_fee }}">

        </div>

        <button
            type="submit"
            class="btn btn-success">

            Update Doctor

        </button>

        <a href="/doctors/"
           class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>

</div>

{% endblock %}
